server:
  port: 8081

spring:
  application:
    name: career-backend

  datasource:
    url: jdbc:h2:mem:career_demo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    mongodb:
      uri: mongodb://localhost:27017/career_demo
    redis:
      host: localhost
      port: 6379
      database: 0

knife4j:
  enable: true
  setting:
    language: en

