server:
  port: 8080

spring:
  application:
    name: career-backend

  # ==============================
  # 1. MySQL 配置 (主数据源)
  # ==============================
  datasource:
    # 注意: 如果你是Mac本地安装，密码可能为空，或者你需要改成你设置的密码
    # serverTimezone 改为 Asia/Shanghai 避免时间差 8 小时
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/career_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate 配置
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update # 开发阶段自动更新表结构
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  # ==============================
  # 邮件 SMTP 配置
  # 默认使用 QQ邮箱，可通过环境变量切换其他服务商：
  #   163邮箱: MAIL_HOST=smtp.163.com  MAIL_PORT=465  MAIL_SSL=true
  #   Gmail:  MAIL_HOST=smtp.gmail.com MAIL_PORT=587  MAIL_SSL=false
  # ==============================
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_qq@qq.com}
    password: ${MAIL_PASSWORD:your_qq_smtp_auth_code}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true    # 587端口必须开启STARTTLS（QQ/163/Gmail通用）
            required: true
          ssl:
            enable: false   # 587用STARTTLS，465才用SSL

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 接口文档工具配置
knife4j:
  enable: true
  setting:
    language: en

# ==============================
# 4. Aliyun OSS 配置
#    Bucket + endpoint can be overridden by env so the same image can be
#    pointed at a different bucket per-env without rebuild.
#    AK/SK have NO defaults — fail-fast if missing.
# ==============================
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-chengdu.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: ${OSS_BUCKET:careerloop-prod}

  # ==============================
  # 5. Aliyun AI (Qwen) 配置
  # ==============================
  ai:
    # Auto-detected from legacy_sprint1
    api-key: ${ALIYUN_AI_API_KEY}
    model: qwen-max

  # ==============================
  # 7. DashScope Voice (Paraformer ASR + CosyVoice TTS)
  #    Reuses the same DashScope API key (aliyun.ai.api-key).
  #    Override the voice via env if you want a different persona.
  # ==============================
  voice:
    asr-model: ${ALIYUN_VOICE_ASR_MODEL:paraformer-realtime-v2}
    tts-model: ${ALIYUN_VOICE_TTS_MODEL:cosyvoice-v2}
    tts-voice: ${ALIYUN_VOICE_TTS_VOICE:longxiaochun_v2}

# ==============================
# 6. WeChat Mini Program
# ==============================
wechat:
  miniapp:
    appid: ${WECHAT_APPID:wx8bdae792853cc263}
    secret: ${WECHAT_SECRET}
