server:
  port: 8080

spring:
  application:
    name: career-backend

  # ==============================
  # 1. MySQL 配置 (主数据源)
  # ==============================
  datasource:
    # 注意: 如果你是Mac本地安装，密码可能为空，或者你需要改成你设置的密码
    # serverTimezone 改为 Asia/Shanghai 避免时间差 8 小时
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/career_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PWD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA / Hibernate 配置
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update # 开发阶段自动更新表结构
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 接口文档工具配置
knife4j:
  enable: true
  setting:
    language: en

# ==============================
# 4. Aliyun OSS 配置
# ==============================
aliyun:
  oss:
    endpoint: oss-cn-chengdu.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET}
    bucket-name: career-resume-store

  # ==============================
  # 5. Aliyun AI (Qwen) 配置
  # ==============================
  ai:
    # Auto-detected from legacy_sprint1
    api-key: ${ALIYUN_AI_API_KEY:sk-d1a79240645449428802d0755537479c}
    model: qwen-max

# ==============================
# 6. WeChat Mini Program
