server:
  port: 8080

spring:
  application:
    name: career-backend-test

  # Test Database Configuration (H2 In-Memory)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA Configuration for Tests
  jpa:
    hibernate:
      ddl-auto: create-drop # Recreate schema for each test
    show-sql: false # Set to true for debugging
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # MongoDB Configuration (Embedded or Testcontainer)
  data:
    mongodb:
      uri: mongodb://localhost:27017/career_test_db

    # Redis Configuration (Embedded)
    redis:
      host: localhost
      port: 6379
      database: 1 # Use different DB for tests

# Disable OSS for tests
aliyun:
  oss:
    endpoint: mock-endpoint
    access-key-id: mock-key-id
    access-key-secret: mock-key-secret
    bucket-name: mock-bucket
  ai:
    api-key: mock-api-key
    model: qwen-max

# Logging
logging:
  level:
    com.group1.career: DEBUG
    org.springframework.test: INFO

