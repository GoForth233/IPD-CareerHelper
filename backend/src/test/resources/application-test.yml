server:
  port: 8080

spring:
  application:
    name: career-backend-test

  # Test Database Configuration (H2 In-Memory)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA Configuration for Tests
  jpa:
    hibernate:
      ddl-auto: create-drop # Recreate schema for each test
    show-sql: false # Set to true for debugging
    open-in-view: false
    properties:
      hibernate:
        format_sql: true


# Disable Mail for tests (use MockitoBean in test classes instead)
spring:
  mail:
    host: localhost
    port: 25
    username: test@test.com
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
            required: false

# Disable OSS for tests
aliyun:
  oss:
    endpoint: mock-endpoint
    access-key-id: mock-key-id
    access-key-secret: mock-key-secret
    bucket-name: mock-bucket
  ai:
    api-key: mock-api-key
    model: qwen-max

# Logging
logging:
  level:
    com.group1.career: DEBUG
    org.springframework.test: INFO

